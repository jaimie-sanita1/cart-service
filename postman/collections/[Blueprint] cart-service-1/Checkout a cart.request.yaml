$kind: http-request
url: "{{baseUrl}}/carts/:cartId/checkout"
method: POST
headers:
  Accept: application/json
pathVariables:
  - key: cartId
    value: "{{cartId}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
examples: ./.resources/Checkout a cart.resources/examples
order: 7000
