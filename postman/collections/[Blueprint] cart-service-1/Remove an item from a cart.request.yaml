$kind: http-request
url: "{{baseUrl}}/carts/:cartId/items/:itemId"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: cartId
    value: "{{cartId}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
  - key: itemId
    value: "{{itemId}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 204', () => pm.response.to.have.status(204));
      pm.test('Response body is empty', () => {
        pm.expect(pm.response.text() || '').to.eql('');
      });
    language: text/javascript
examples: ./.resources/Remove an item from a cart.resources/examples
order: 6000
