$kind: http-example
request:
  url: "{{baseUrl}}/carts/:cartId/items"
  method: POST
  headers:
    Content-Type: application/json
  pathVariables:
    cartId: "{{cartId}}"
  body:
    type: json
    content: |-
      {
        "productId": "prod_001",
        "quantity": 2
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "item_xyz789",
        "productId": "prod_001",
        "name": "Wireless Headphones",
        "price": 29.99,
        "quantity": 2,
        "subtotal": 59.98
      }
order: 1000
