$kind: http-request
name: '4 - Update item quantity'
method: PATCH
url: '{{baseUrl}}/carts/{{cartId}}/items/{{itemId}}'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "quantity": 3
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
      pm.test("Quantity updated to 3", () => {
        const json = pm.response.json();
        pm.expect(json.quantity).to.eql(3);
      });
