$kind: http-request
name: '6 - Checkout cart'
method: POST
url: '{{baseUrl}}/carts/{{cartId}}/checkout'
order: 6000
examples: ./.resources/6-checkout-cart.resources/examples
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
      pm.test("Order confirmed", () => {
        const json = pm.response.json();
        pm.expect(json.id).to.be.a("string");
        pm.expect(json.status).to.eql("confirmed");
      });
