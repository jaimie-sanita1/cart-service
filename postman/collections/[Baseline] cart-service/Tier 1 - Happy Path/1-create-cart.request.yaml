$kind: http-request
name: 1 - Create cart
method: POST
url: "{{baseUrl}}/carts"
order: 1000
examples: ./.resources/1-create-cart.resources/examples
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 201", () => pm.response.to.have.status(201));
      pm.test("Response has cart id", () => {
        const json = pm.response.json();
        pm.expect(json.id).to.be.a("string");
        pm.collectionVariables.set("cartId", json.id);
      });
    language: text/javascript
