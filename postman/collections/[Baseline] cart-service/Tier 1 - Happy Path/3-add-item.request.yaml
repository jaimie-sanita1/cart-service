$kind: http-request
name: '3 - Add item'
method: POST
url: '{{baseUrl}}/carts/{{cartId}}/items'
order: 3000
examples: ./.resources/3-add-item.resources/examples
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "productId": "{{productId}}",
      "quantity": 2
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 201", () => pm.response.to.have.status(201));
      pm.test("Item created and id captured", () => {
        const json = pm.response.json();
        pm.expect(json.id).to.be.a("string");
        pm.expect(json.quantity).to.eql(2);
        pm.collectionVariables.set("itemId", json.id);
      });
