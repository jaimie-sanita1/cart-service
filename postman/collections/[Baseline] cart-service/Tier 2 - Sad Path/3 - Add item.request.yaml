$kind: http-request
url: "{{baseUrl}}/carts/{{cartId}}/items"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "productId": "{{productId}}",
      "quantity": 2
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 201", () => pm.response.to.have.status(201));
      pm.test("Item created and id captured", () => {
        const json = pm.response.json();
        pm.expect(json.id).to.be.a("string");
        pm.expect(json.quantity).to.eql(2);
        pm.collectionVariables.set("itemId", json.id);
      });

      pm.test("Returned CartItem has productId we sent", () => {
        // Confirms the service stored the productId from the request body
        pm.expect(pm.response.json().productId).to.eql(pm.collectionVariables.get("productId"));
      });

      pm.test("Subtotal equals price * quantity", () => {
        // Catches pricing/math regressions early
        const { price, quantity, subtotal } = pm.response.json();
        pm.expect(subtotal).to.be.closeTo(price * quantity, 0.001);
      });
    language: text/javascript
order: 3000
