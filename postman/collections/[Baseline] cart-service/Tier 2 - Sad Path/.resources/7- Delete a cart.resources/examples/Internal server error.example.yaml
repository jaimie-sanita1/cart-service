$kind: http-example
request:
  url: "{{baseUrl}}/carts/:cartId"
  method: DELETE
  headers:
    Accept: application/json
  pathVariables:
    cartId: string
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "NOT_FOUND",
        "message": "Cart not found"
      }
order: 3000
