$kind: http-request
name: '9 - Checkout empty cart'
method: POST
url: '{{baseUrl}}/carts/{{secondCartId}}/checkout'
order: 3000
examples: ./.resources/9-checkout-empty-cart.resources/examples
headers:
  - key: x-mock-response-code
    value: '409'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 409 (cart empty)", () => pm.response.to.have.status(409));
      pm.test("Error has code and message", () => {
        const json = pm.response.json();
        pm.expect(json.code).to.be.a("string");
        pm.expect(json.message).to.be.a("string");
      });
