$kind: http-example
request:
  url: "{{baseUrl}}/carts/:cartId/checkout"
  method: POST
  headers:
    x-mock-response-code: '409'
  pathVariables:
    cartId: "{{secondCartId}}"
  body:
    type: text
    content: ""
response:
  statusCode: 409
  statusText: Conflict
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "CART_EMPTY",
        "message": "Cart is empty"
      }
order: 1000
