$kind: http-request
url: "{{baseUrl}}/carts/:cartId/items/:itemId"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: cartId
    value: "{{cartId}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
  - key: itemId
    value: "{{itemId}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 204", function () {
          pm.response.to.have.status(204);
      });

      pm.test("Response body is empty", function () {
          pm.expect(pm.response.text()).to.eql("");
      });

      pm.collectionVariables.unset("itemId");
      pm.collectionVariables.unset("cartId");
    language: text/javascript
examples: ./.resources/Remove an item from a cart.resources/examples
order: 6000
