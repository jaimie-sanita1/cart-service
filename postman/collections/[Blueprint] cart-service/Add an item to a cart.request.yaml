$kind: http-request
name: Add an item to a cart
url: "{{baseUrl}}/carts/:cartId/items"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: cartId
    value: "{{cartId}}"
    disabled: false
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "default": "<string>"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "productId": "prod_001",
      "quantity": 2
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "productId": {
          "type": "string",
          "example": "prod_001"
        },
        "quantity": {
          "type": "integer",
          "minimum": 1,
          "example": 2
        }
      },
      "required": [
        "productId",
        "quantity"
      ]
    }
scripts:
  - type: afterResponse
    code: |-
      // save the `itemId` returned in the response as a collection variables
      var jsonData = pm.response.json();
      pm.collectionVariables.set("itemId", jsonData.id);

      pm.test("Status code is 201", function () {
          pm.response.to.have.status(201);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.have.header("Content-Type");
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      pm.test("Response matches CartItem contract", function () {
          const jsonData = pm.response.json();

          pm.expect(jsonData).to.be.an("object");
          pm.expect(jsonData).to.have.property("id").that.is.a("string");
          pm.expect(jsonData).to.have.property("productId").that.is.a("string");
          pm.expect(jsonData).to.have.property("name").that.is.a("string");
          pm.expect(jsonData).to.have.property("price").that.is.a("number");
          pm.expect(jsonData).to.have.property("quantity").that.is.a("number");
          pm.expect(jsonData).to.have.property("subtotal").that.is.a("number");
      });

      pm.test("Returned item reflects request body contract values", function () {
          const jsonData = pm.response.json();
          const requestBody = JSON.parse(pm.request.body.raw || "{}");

          pm.expect(jsonData.productId).to.eql(requestBody.productId);
          pm.expect(jsonData.quantity).to.eql(requestBody.quantity);
      });

      pm.test("CartItem numeric fields are valid", function () {
          const jsonData = pm.response.json();

          pm.expect(jsonData.price).to.be.at.least(0);
          pm.expect(jsonData.quantity).to.be.at.least(1);
          pm.expect(jsonData.subtotal).to.be.at.least(0);
      });
    language: text/javascript
  - type: beforeRequest
    code: ""
    language: text/javascript
examples: ./.resources/Add an item to a cart.resources/examples
order: 3000
