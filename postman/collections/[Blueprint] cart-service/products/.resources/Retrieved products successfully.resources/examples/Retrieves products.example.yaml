$kind: http-example
request:
  url: "{{baseUrl}}/products"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      [
        {
          "id": "prod_001",
          "name": "Nike Air Max 90",
          "price": 129.99,
          "availability": "in_stock"
        },
        {
          "id": "prod_001",
          "name": "Nike Air Max 90",
          "price": 129.99,
          "availability": "in_stock"
        }
      ]
    $type: |-
      {
        "type": "array",
        "items": {
          "type": "object",
          "properties": {
            "id": {
              "type": "string",
              "example": "prod_001"
            },
            "name": {
              "type": "string",
              "example": "Nike Air Max 90"
            },
            "price": {
              "type": "number",
              "example": 129.99
            },
            "availability": {
              "type": "string",
              "example": "in_stock"
            }
          }
        }
      }
order: 1000
