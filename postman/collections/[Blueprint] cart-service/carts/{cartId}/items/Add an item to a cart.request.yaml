$kind: http-request
url: "{{baseUrl}}/carts/:cartId/items"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: cartId
    value: string
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "productId": "prod_001",
      "quantity": 2
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "productId": {
          "type": "string",
          "example": "prod_001"
        },
        "quantity": {
          "type": "integer",
          "minimum": 1,
          "example": 2
        }
      },
      "required": [
        "productId",
        "quantity"
      ]
    }
examples: ./.resources/Add an item to a cart.resources/examples
order: 1000
