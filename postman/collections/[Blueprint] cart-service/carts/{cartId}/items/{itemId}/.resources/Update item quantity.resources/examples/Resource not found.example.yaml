$kind: http-example
request:
  url: "{{baseUrl}}/carts/:cartId/items/:itemId"
  method: PATCH
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    cartId: string
    itemId: string
  body:
    type: json
    content: |-
      {
        "quantity": 3
      }
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "NOT_FOUND",
        "message": "Cart not found"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "code": {
            "type": "string",
            "example": "NOT_FOUND"
          },
          "message": {
            "type": "string",
            "example": "Cart not found"
          }
        }
      }
order: 2000
