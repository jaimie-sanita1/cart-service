$kind: http-example
request:
  url: "{{baseUrl}}/carts/:cartId/items/:itemId"
  method: PATCH
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    cartId: string
    itemId: string
  body:
    type: json
    content: |-
      {
        "quantity": 3
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "NOT_FOUND",
        "message": "Cart not found"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "code": {
            "type": "string",
            "example": "NOT_FOUND"
          },
          "message": {
            "type": "string",
            "example": "Cart not found"
          }
        }
      }
order: 3000
