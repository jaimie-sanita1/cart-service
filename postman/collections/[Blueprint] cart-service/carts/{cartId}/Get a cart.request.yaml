$kind: http-request
url: "{{baseUrl}}/carts/:cartId"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: cartId
    value: "{{cartId}}"
    disabled: false
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "default": "<string>"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 200', () => pm.response.to.have.status(200));
      pm.test('Response is JSON with cart shape', () => {
        const json = pm.response.json();
        pm.expect(json.id).to.be.a('string');
        pm.expect(json.items).to.be.an('array');
        pm.expect(json.total).to.be.a('number');
      });
    language: text/javascript
examples: ./.resources/Get a cart.resources/examples
order: 1000
