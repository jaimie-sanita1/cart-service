$kind: http-request
name: Delete a cart
url: "{{baseUrl}}/carts/:cartId"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: cartId
    value: '{{cartId}}'
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "default": "<string>"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
examples: ./.resources/Delete a cart.resources/examples
order: 2000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 204', () => pm.response.to.have.status(204));
      pm.test('Response body is empty', () => {
        pm.expect(pm.response.text() || '').to.eql('');
      });