$kind: http-request
url: "{{baseUrl}}/carts"
method: POST
headers:
  Accept: application/json
body:
  type: text
  content: ""
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 201', () => pm.response.to.have.status(201));
      pm.test('Response has cart id', () => {
        const json = pm.response.json();
        pm.expect(json.id).to.be.a('string').and.not.empty;
        pm.collectionVariables.set('cartId', json.id);
      });
    language: text/javascript
examples: ./.resources/Create a cart.resources/examples
order: 1000
