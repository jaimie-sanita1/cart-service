$kind: http-request
name: Create a cart
url: "{{baseUrl}}/carts"
method: POST
headers:
  - key: Accept
    value: application/json
    disabled: false
  - key: x-mock-response-code
    value: "500"
    disabled: true
    description: ""
body:
  type: text
  content: ""
examples: ./.resources/Create a cart.resources/examples
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 201', () => pm.response.to.have.status(201));
      pm.test('Response has cart id', () => {
        const json = pm.response.json();
        pm.expect(json.id).to.be.a('string').and.not.empty;
        pm.collectionVariables.set('cartId', json.id);
      });