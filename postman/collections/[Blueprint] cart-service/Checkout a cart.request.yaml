$kind: http-request
name: Checkout a cart
url: "{{baseUrl}}/carts/:cartId/checkout"
method: POST
headers:
  Accept: application/json
pathVariables:
  - key: cartId
    value: "{{cartId}}"
    disabled: false
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "default": "<string>"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
scripts:
  - type: beforeRequest
    code: |+
      function createItem(cartId) {
          pm.sendRequest({
              url: `${pm.collectionVariables.get("baseUrl")}/carts/${cartId}/items`,
              method: "POST",
              header: {
                  "Content-Type": "application/json",
                  "Accept": "application/json"
              },
              body: {
                  mode: "raw",
                  raw: JSON.stringify({
                      productId: "prod_001",
                      quantity: 2
                  })
              }
          }, (err, res) => {
              if (err) {
                  console.error("Failed to create item:", err);
                  return;
              }

              const item = res.json();
              pm.collectionVariables.set("itemId", item.id);
              console.log("Created item:", item.id);
          });
      }

      // If cartId is undefined, create a cart first, then create item
      if (!pm.collectionVariables.get("cartId")) {
          pm.sendRequest({
              url: `${pm.collectionVariables.get("baseUrl")}/carts`,
              method: "POST",
              header: {
                  "Content-Type": "application/json",
                  "Accept": "application/json"
              },
              body: {
                  mode: "raw",
                  raw: JSON.stringify({})
              }
          }, (err, res) => {
              if (err) {
                  console.error("Failed to create cart:", err);
                  return;
              }

              const cart = res.json();
              pm.collectionVariables.set("cartId", cart.id);
              console.log("Created cart:", cart.id);

              if (!pm.collectionVariables.get("itemId")) {
                  createItem(cart.id);
              }
          });
      } else if (!pm.collectionVariables.get("itemId")) {
          createItem(pm.collectionVariables.get("cartId"));
      }

    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.collectionVariables.unset("cartId");
    language: text/javascript
examples: ./.resources/Checkout a cart.resources/examples
order: 6000
