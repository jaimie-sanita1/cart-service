$kind: http-request
url: "{{baseUrl}}/carts/:cartId/checkout"
method: POST
headers:
  Accept: application/json
pathVariables:
  - key: cartId
    value: "{{cartId}}"
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
scripts:
  - type: beforeRequest
    code: |+
      function createItem(cartId) {
          pm.sendRequest({
              url: `${pm.variables.get("baseUrl")}/carts/${cartId}/items`,
              method: "POST",
              header: {
                  "Content-Type": "application/json",
                  "Accept": "application/json"
              },
              body: {
                  mode: "raw",
                  raw: JSON.stringify({
                      productId: "prod_001",
                      quantity: 2
                  })
              }
          }, (err, res) => {
              if (err) {
                  console.error("Failed to create item:", err);
                  return;
              }

              const item = res.json();
              pm.collectionVariables.set("itemId", item.id);
              console.log("Created item:", item.id);
          });
      }

      // If cartId is undefined, create a cart first, then create item
      if (!pm.collectionVariables.get("cartId")) {
          pm.sendRequest({
              url: `${pm.variables.get("baseUrl")}/carts`,
              method: "POST",
              header: {
                  "Content-Type": "application/json",
                  "Accept": "application/json"
              },
              body: {
                  mode: "raw",
                  raw: JSON.stringify({})
              }
          }, (err, res) => {
              if (err) {
                  console.error("Failed to create cart:", err);
                  return;
              }

              const cart = res.json();
              pm.collectionVariables.set("cartId", cart.id);
              console.log("Created cart:", cart.id);

              if (!pm.collectionVariables.get("itemId")) {
                  createItem(cart.id);
              }
          });
      } else if (!pm.collectionVariables.get("itemId")) {
          createItem(pm.collectionVariables.get("cartId"));
      }

    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.have.header("Content-Type");
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      pm.test("Response matches Order contract", function () {
          const jsonData = pm.response.json();

          pm.expect(jsonData).to.be.an("object");
          pm.expect(jsonData).to.have.property("id").that.is.a("string");
          pm.expect(jsonData).to.have.property("cartId").that.is.a("string");
          pm.expect(jsonData).to.have.property("items").that.is.an("array");
          pm.expect(jsonData).to.have.property("total").that.is.a("number");
          pm.expect(jsonData).to.have.property("status").that.is.a("string");
          pm.expect(jsonData).to.have.property("createdAt").that.is.a("string");
      });

      pm.test("Order status is within contract enum", function () {
          const jsonData = pm.response.json();

          pm.expect(jsonData.status).to.be.oneOf([
              "confirmed",
              "processing",
              "shipped",
              "delivered"
          ]);
      });

      pm.test("Order createdAt is a valid ISO 8601 date-time", function () {
          const jsonData = pm.response.json();

          pm.expect(Date.parse(jsonData.createdAt)).to.not.equal(NaN);
      });

      pm.test("Order items match CartItem contract", function () {
          const jsonData = pm.response.json();

          jsonData.items.forEach((item) => {
              pm.expect(item).to.have.property("id").that.is.a("string");
              pm.expect(item).to.have.property("productId").that.is.a("string");
              pm.expect(item).to.have.property("name").that.is.a("string");
              pm.expect(item).to.have.property("price").that.is.a("number");
              pm.expect(item).to.have.property("quantity").that.is.a("number");
              pm.expect(item).to.have.property("subtotal").that.is.a("number");
          });
      });

      pm.collectionVariables.unset("cartId");
    language: text/javascript
examples: ./.resources/Checkout a cart.resources/examples
order: 7000
