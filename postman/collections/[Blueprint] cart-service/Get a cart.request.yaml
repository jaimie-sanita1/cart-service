$kind: http-request
name: Get a cart
url: "{{baseUrl}}/carts/:cartId"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: cartId
    value: "{{cartId}}"
    disabled: false
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "default": "<string>"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.have.header("Content-Type");
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      pm.test("Response matches Cart contract", function () {
          const jsonData = pm.response.json();

          pm.expect(jsonData).to.be.an("object");
          pm.expect(jsonData).to.have.property("id").that.is.a("string");
          pm.expect(jsonData).to.have.property("items").that.is.an("array");
          pm.expect(jsonData).to.have.property("total").that.is.a("number");
          pm.expect(jsonData).to.have.property("createdAt").that.is.a("string");
          pm.expect(jsonData).to.have.property("updatedAt").that.is.a("string");
      });

      pm.test("Cart timestamps are valid ISO 8601 date-times", function () {
          const jsonData = pm.response.json();

          pm.expect(Date.parse(jsonData.createdAt)).to.not.equal(NaN);
          pm.expect(Date.parse(jsonData.updatedAt)).to.not.equal(NaN);
      });

      pm.test("Cart items match CartItem contract", function () {
          const jsonData = pm.response.json();

          jsonData.items.forEach((item) => {
              pm.expect(item).to.have.property("id").that.is.a("string");
              pm.expect(item).to.have.property("productId").that.is.a("string");
              pm.expect(item).to.have.property("name").that.is.a("string");
              pm.expect(item).to.have.property("price").that.is.a("number");
              pm.expect(item).to.have.property("quantity").that.is.a("number");
              pm.expect(item).to.have.property("subtotal").that.is.a("number");
          });
      });
    language: text/javascript
examples: ./.resources/Get a cart.resources/examples
order: 2000
