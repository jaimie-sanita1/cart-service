apiVersion: apps/v1
kind: Deployment
metadata:
  name: js-cart-service
  labels:
    app: js-cart-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: js-cart-service
  template:
    metadata:
      labels:
        app: js-cart-service
    spec:
      containers:
        - name: js-cart-service
          image: 005904641462.dkr.ecr.us-east-2.amazonaws.com/js-cart-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
